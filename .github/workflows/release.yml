name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write   # create GitHub release
  id-token: write   # OIDC Trusted Publisher (PyPI)

jobs:
  build-linux:
    name: Build wheels — Linux
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: PyO3/maturin-action@v1
        with:
          command: build
          args: --release --out dist
          manylinux: auto
          working-directory: cforge-py

      - uses: actions/upload-artifact@v4
        with:
          name: wheels-linux
          path: cforge-py/dist

  build-macos:
    name: Build wheels — macOS (arm64 + x86_64)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: PyO3/maturin-action@v1
        with:
          command: build
          args: --release --out dist --target universal2-apple-darwin
          working-directory: cforge-py

      - uses: actions/upload-artifact@v4
        with:
          name: wheels-macos
          path: cforge-py/dist

  build-windows:
    name: Build wheels — Windows
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: PyO3/maturin-action@v1
        with:
          command: build
          args: --release --out dist
          working-directory: cforge-py

      - uses: actions/upload-artifact@v4
        with:
          name: wheels-windows
          path: cforge-py/dist

  build-sdist:
    name: Build source distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: PyO3/maturin-action@v1
        with:
          command: sdist
          args: --out dist
          working-directory: cforge-py

      - uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: cforge-py/dist

  publish-pypi:
    name: Publish to PyPI
    needs: [build-linux, build-macos, build-windows, build-sdist]
    runs-on: ubuntu-latest
    environment: pypi
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: wheels-*
          merge-multiple: true
          path: dist

      - uses: actions/download-artifact@v4
        with:
          name: sdist
          path: dist

      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist

  github-release:
    name: Create GitHub Release
    needs: [build-linux, build-macos, build-windows, build-sdist]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: wheels-*
          merge-multiple: true
          path: dist

      - uses: actions/download-artifact@v4
        with:
          name: sdist
          path: dist

      - uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
